nverter.setDefaultCharset(Charset.forName(&quot;UTF-8&quot;));</div><div class="line">        converters.add(converter);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    /**</div><div class="line">     * 异常处理</div><div class="line">     *</div><div class="line">     * @param resolvers 异常处理集合</div><div class="line">     */</div><div class="line">    @Override</div><div class="line">    public void configureHandlerExceptionResolvers(List&lt;HandlerExceptionResolver&gt; resolvers) &#123;</div><div class="line">        resolvers.add(new HandlerExceptionResolver() &#123;</div><div class="line">            @Override</div><div class="line">            public ModelAndView resolveException(HttpServletRequest httpServletRequest, HttpServletResponse httpServletResponse, Object handler, Exception e) &#123;</div><div class="line">                Result result = new Result();</div><div class="line">                if (e instanceof ServiceException) &#123;//业务失败的异常，如“账号或密码错误”</div><div class="line">                    result.setCode(ResultCode.FAIL).setMessage(e.getMessage());</div><div class="line">                    log.info(e.getMessage());</div><div class="line">                &#125; else if (e instanceof NoHandlerFoundException) &#123;</div><div class="line">                    result.setCode(ResultCode.NOT_FOUND).setMessage(&quot;接口 [&quot; + httpServletRequest.getRequestURI() + &quot;] 不存在&quot;);</div><div class="line">                &#125; else if (e instanceof ServletException) &#123;</div><div class="line">                    result.setCode(ResultCode.FAIL).setMessage(e.getMessage());</div><div class="line">                &#125; else &#123;</div><div class="line">                    result.setCode(ResultCode.INTERNAL_SERVER_ERROR).setMessage(&quot;接口 [&quot; + httpServletRequest.getRequestURI() + &quot;] 内部错误，请联系管理员&quot;);</div><div class="line">                    String message;</div><div class="line">                    if (handler instanceof HandlerMethod) &#123;</div><div class="line">                        HandlerMethod handlerMethod = (HandlerMethod) handler;</div><div class="line">                        message = String.format(&quot;接口 [%s] 出现异常，方法：%s.%s，异常摘要：%s&quot;,</div><div class="line">                                httpServletRequest.getRequestURI(),</div><div class="line">                                handlerMethod.getBean().getClass().getName(),</div><div class="line">                                handlerMethod.getMethod().getName(),</div><div class="line">                                e.getMessage());</div><div class="line">                    &#125; else &#123;</div><div class="line">                        message = e.getMessage();</div><div class="line">                    &#125;</div><div class="line">                    log.error(message, e);</div><div class="line">                &#125;</div><div class="line">                responseResult(httpServletResponse, result);</div><div class="line">                return new ModelAndView();</div><div class="line">            &#125;</div><div class="line">        &#125;);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    private void responseResult(HttpServletResponse response, Result result) &#123;</div><div class="line">        response.setCharacterEncoding(&quot;UTF-8&quot;);</div><div class="line">        response.setHeader(&quot;Content-type&quot;, &quot;application/json;charset=UTF-8&quot;);</div><div class="line">        response.setStatus(200);</div><div class="line">        try &#123;</div><div class="line">            response.getWriter().write(JSON.toJSONString(result));</div><div class="line">        &#125; catch (IOException ex) &#123;</div><div class="line">            log.error(ex.getMessage());</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line"></div><div class="line">    //解决跨域问题</div><div class="l
