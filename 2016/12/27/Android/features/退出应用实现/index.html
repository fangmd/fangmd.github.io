oid</span> <span class="title">addActivity</span><span class="params">(Activity activity)</span></span></div><div class="line">    &#123;</div><div class="line"></div><div class="line">        activityList.add(activity);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">exit</span><span class="params">()</span></span></div><div class="line">    &#123;</div><div class="line"></div><div class="line">        <span class="keyword">for</span> (Activity activity : activityList)</div><div class="line">        &#123;</div><div class="line">            activity.finish();</div><div class="line">        &#125;</div><div class="line">        System.exit(<span class="number">0</span>);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
